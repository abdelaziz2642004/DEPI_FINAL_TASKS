<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LinkVault — Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="vh-100 d-flex align-items-center justify-content-center">

<div class="container" style="max-width:440px">
  <div class="text-center mb-4">
    <div class="brand-logo mb-3">
      <i class="bi bi-bookmarks-fill" style="font-size:2.8rem;color:var(--accent)"></i>
    </div>
    <h1 class="fw-bold fs-3">LinkVault</h1>
    <p class="text-muted small">your personal bookmark & notes space</p>
  </div>

  <!-- tab switch -->
  <ul class="nav nav-pills nav-justified mb-4" id="authTabs">
    <li class="nav-item">
      <button class="nav-link active" id="tab-login" onclick="showTab('login')">Login</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" id="tab-register" onclick="showTab('register')">Register</button>
    </li>
  </ul>

  <div id="alertBox"></div>

  <!-- LOGIN FORM -->
  <div id="loginForm" class="card p-4">
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" id="loginEmail" class="form-control" placeholder="you@example.com">
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" id="loginPass" class="form-control" placeholder="••••••••">
    </div>
    <button class="btn btn-primary w-100 mt-2" onclick="doLogin()">
      <span id="loginSpinner" class="spinner-border spinner-border-sm me-2 d-none"></span>
      Sign In
    </button>
  </div>

  <!-- REGISTER FORM -->
  <div id="registerForm" class="card p-4 d-none">
    <div class="row g-2 mb-3">
      <div class="col">
        <label class="form-label">First Name</label>
        <input type="text" id="regFirst" class="form-control" placeholder="John">
      </div>
      <div class="col">
        <label class="form-label">Last Name</label>
        <input type="text" id="regLast" class="form-control" placeholder="Doe">
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" id="regEmail" class="form-control" placeholder="you@example.com">
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" id="regPass" class="form-control" placeholder="min 6 characters">
    </div>
    <button class="btn btn-success w-100 mt-2" onclick="doRegister()">
      <span id="regSpinner" class="spinner-border spinner-border-sm me-2 d-none"></span>
      Create Account
    </button>
  </div>

  <div class="text-center mt-3">
    <button class="btn btn-sm btn-outline-secondary" onclick="toggleTheme()">
      <i class="bi bi-moon-stars-fill me-1"></i> Toggle Dark/Light
    </button>
  </div>
</div>

<script>
const API = 'http://linkvaultapi.runasp.net/api'

// if already logged in just go to categories
if (localStorage.getItem('lv_token')) {
  window.location.href = 'categories.html'
}

// load saved theme
if (localStorage.getItem('lv_theme') === 'light') {
  document.documentElement.setAttribute('data-theme', 'light')
}

function showTab(tab) {
  document.getElementById('loginForm').classList.toggle('d-none', tab !== 'login')
  document.getElementById('registerForm').classList.toggle('d-none', tab !== 'register')
  document.getElementById('tab-login').classList.toggle('active', tab === 'login')
  document.getElementById('tab-register').classList.toggle('active', tab === 'register')
  clearAlert()
}

function showAlert(msg, type='danger') {
  document.getElementById('alertBox').innerHTML = `
    <div class="alert alert-${type} alert-dismissible fade show" role="alert">
      ${msg}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>`
  // auto remove after 5 sec
  setTimeout(() => {
    const el = document.getElementById('alertBox').querySelector('.alert')
    if (el) el.remove()
  }, 5000)
}

function clearAlert() {
  document.getElementById('alertBox').innerHTML = ''
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim()
  const pass = document.getElementById('loginPass').value
  if (!email || !pass) return showAlert('Please fill in all fields.')

  document.getElementById('loginSpinner').classList.remove('d-none')
  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    })
    const data = await res.json().catch(() => ({}))
    if (!res.ok) {
      showAlert(data.message || data.error || 'Invalid email or password.')
      return
    }
    // token could be in different places depending on api
    const token = data.token || data.accessToken || data.jwt || data
    if (typeof token !== 'string') {
      showAlert('Login failed — unexpected response from server.')
      return
    }
    localStorage.setItem('lv_token', token)
    window.location.href = 'categories.html'
  } catch(e) {
    showAlert('Cannot reach the server. Check your connection.')
  } finally {
    document.getElementById('loginSpinner').classList.add('d-none')
  }
}

async function doRegister() {
  const first = document.getElementById('regFirst').value.trim()
  const last = document.getElementById('regLast').value.trim()
  const email = document.getElementById('regEmail').value.trim()
  const pass = document.getElementById('regPass').value
  if (!first || !last || !email || !pass) return showAlert('All fields are required.')
  if (pass.length < 6) return showAlert('Password must be at least 6 characters.')

  document.getElementById('regSpinner').classList.remove('d-none')
  try {
    const res = await fetch(`${API}/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ firstName: first, lastName: last, email, password: pass })
    })
    const data = await res.json().catch(() => ({}))
    if (!res.ok) {
      showAlert(data.message || data.error || 'Registration failed.')
      return
    }
    const token = data.token || data.accessToken || data.jwt || data
    if (typeof token === 'string') {
      localStorage.setItem('lv_token', token)
      window.location.href = 'categories.html'
    } else {
      // maybe login needed after register
      showAlert('Account created! Please login now.', 'success')
      setTimeout(() => showTab('login'), 1500)
    }
  } catch(e) {
    showAlert('Cannot reach the server. Check your connection.')
  } finally {
    document.getElementById('regSpinner').classList.add('d-none')
  }
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme')
  const next = current === 'dark' ? 'light' : 'dark'
  document.documentElement.setAttribute('data-theme', next)
  localStorage.setItem('lv_theme', next)
}

// enter key on login
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (!document.getElementById('loginForm').classList.contains('d-none')) doLogin()
    else doRegister()
  }
})
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
