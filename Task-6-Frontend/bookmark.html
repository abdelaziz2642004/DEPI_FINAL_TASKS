<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bookmark — LinkVault</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container py-3" style="max-width:800px">
  <div class="mb-4">
    <a href="bookmarks.html" class="btn btn-sm btn-outline-secondary">
      <i class="bi bi-arrow-left me-1"></i>Back to Bookmarks
    </a>
  </div>

  <div id="loadingState" class="text-center py-5">
    <div class="spinner-border text-secondary"></div>
    <p class="text-muted mt-2">Loading...</p>
  </div>

  <div id="errorState" class="d-none">
    <div class="alert alert-danger">Bookmark not found or an error occurred.</div>
  </div>

  <!-- bookmark details card -->
  <div id="detailCard" class="d-none">
    <div class="card p-4 mb-4">
      <div class="d-flex justify-content-between align-items-start mb-3 flex-wrap gap-2">
        <h2 class="fw-bold mb-0" id="bmDetailTitle"></h2>
        <div class="d-flex gap-2">
          <button class="btn btn-sm btn-outline-warning" id="favBtn" onclick="toggleFav()"></button>
          <button class="btn btn-sm btn-outline-secondary" id="archBtn" onclick="toggleArch()"></button>
        </div>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-12 detail-field">
          <label>URL</label>
          <p><a id="bmDetailUrl" href="#" target="_blank" rel="noopener" class="text-break" style="color:var(--accent)"></a></p>
        </div>
        <div class="col-sm-6 detail-field">
          <label>Category</label>
          <p><span class="badge-cat" id="bmDetailCat"></span></p>
        </div>
        <div class="col-sm-6 detail-field">
          <label>Added On</label>
          <p id="bmDetailDate" class="text-muted"></p>
        </div>
      </div>
    </div>

    <!-- notes section -->
    <div class="page-header">
      <h4 class="fw-bold mb-0"><i class="bi bi-chat-left-text me-2" style="color:var(--accent)"></i>Notes</h4>
      <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#noteModal" onclick="clearNoteForm()">
        <i class="bi bi-plus-lg me-1"></i>Add Note
      </button>
    </div>

    <div id="notesContainer"></div>
  </div>
</div>

<!-- add note modal -->
<div class="modal fade" id="noteModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Add Note</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="noteAlert"></div>
        <div class="mb-3">
          <label class="form-label">Content <span class="text-danger">*</span></label>
          <textarea id="noteContent" class="form-control" rows="4" placeholder="Write your note..." maxlength="1000"></textarea>
          <div class="form-text text-muted">Max 1000 characters</div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" onclick="addNote()">
          <span id="noteSaveSpinner" class="spinner-border spinner-border-sm me-2 d-none"></span>
          Save Note
        </button>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
buildNav('bookmarks')

// get bookmark id from url
const urlParams = new URLSearchParams(window.location.search)
const bmId = parseInt(urlParams.get('id'))
let currentBm = null

if (!bmId) {
  document.getElementById('loadingState').classList.add('d-none')
  document.getElementById('errorState').classList.remove('d-none')
} else {
  loadBookmark()
}

async function loadBookmark() {
  const res = await apiFetch(`/bookmarks/${bmId}`)
  if (!res || !res.ok) {
    document.getElementById('loadingState').classList.add('d-none')
    document.getElementById('errorState').classList.remove('d-none')
    return
  }

  currentBm = await res.json()
  renderDetail(currentBm)
  loadNotes()

  document.getElementById('loadingState').classList.add('d-none')
  document.getElementById('detailCard').classList.remove('d-none')
}

function renderDetail(bm) {
  document.title = `${bm.title} — LinkVault`
  document.getElementById('bmDetailTitle').textContent = bm.title
  const urlEl = document.getElementById('bmDetailUrl')
  urlEl.href = bm.url
  urlEl.textContent = bm.url
  document.getElementById('bmDetailCat').textContent = bm.categoryName || ''
  document.getElementById('bmDetailDate').textContent = fmtDate(bm.createdAt)
  updateButtons(bm)
}

function updateButtons(bm) {
  const favBtn = document.getElementById('favBtn')
  favBtn.textContent = bm.isFavorite ? '★ Favorited' : '☆ Favorite'
  favBtn.className = bm.isFavorite ? 'btn btn-sm btn-warning' : 'btn btn-sm btn-outline-warning'

  const archBtn = document.getElementById('archBtn')
  archBtn.textContent = bm.isArchived ? '📦 Archived' : '📂 Archive'
}

async function toggleFav() {
  if (!currentBm) return
  const res = await apiFetch(`/bookmarks/${bmId}`, {
    method: 'PUT',
    body: JSON.stringify({ url: currentBm.url, title: currentBm.title, categoryId: currentBm.categoryId, isFavorite: !currentBm.isFavorite, isArchived: currentBm.isArchived })
  })
  if (res && res.ok) {
    currentBm.isFavorite = !currentBm.isFavorite
    updateButtons(currentBm)
    showToast(currentBm.isFavorite ? 'Added to favorites ★' : 'Removed from favorites', 'info')
  }
}

async function toggleArch() {
  if (!currentBm) return
  const res = await apiFetch(`/bookmarks/${bmId}`, {
    method: 'PUT',
    body: JSON.stringify({ url: currentBm.url, title: currentBm.title, categoryId: currentBm.categoryId, isFavorite: currentBm.isFavorite, isArchived: !currentBm.isArchived })
  })
  if (res && res.ok) {
    currentBm.isArchived = !currentBm.isArchived
    updateButtons(currentBm)
    showToast(currentBm.isArchived ? 'Archived 📦' : 'Unarchived', 'info')
  }
}

async function loadNotes() {
  const container = document.getElementById('notesContainer')
  container.innerHTML = '<p class="text-muted small">Loading notes...</p>'

  const res = await apiFetch(`/bookmarks/${bmId}/notes`)
  if (!res || !res.ok) {
    container.innerHTML = '<p class="text-danger small">Failed to load notes.</p>'
    return
  }
  const notes = await res.json()
  renderNotes(notes)
}

function renderNotes(notes) {
  const container = document.getElementById('notesContainer')
  if (notes.length === 0) {
    container.innerHTML = `<div class="empty-state"><i class="bi bi-chat-left-dots"></i><p>No notes yet. Add one above!</p></div>`
    return
  }
  container.innerHTML = notes.map(n => `
    <div class="note-card mb-3" id="note-${n.id}">
      <div class="d-flex justify-content-between align-items-start gap-2">
        <p class="mb-1">${escHtml(n.content)}</p>
        <button class="btn btn-sm btn-outline-danger flex-shrink-0" onclick="deleteNote(${n.id})">
          <i class="bi bi-trash3"></i>
        </button>
      </div>
      <span class="note-date"><i class="bi bi-clock me-1"></i>${fmtDate(n.createdAt)}</span>
    </div>`).join('')
}

function clearNoteForm() {
  document.getElementById('noteContent').value = ''
  document.getElementById('noteAlert').innerHTML = ''
}

async function addNote() {
  const content = document.getElementById('noteContent').value.trim()
  if (!content) {
    document.getElementById('noteAlert').innerHTML = '<div class="alert alert-danger py-2 small">Content is required.</div>'
    return
  }

  document.getElementById('noteSaveSpinner').classList.remove('d-none')
  const res = await apiFetch(`/bookmarks/${bmId}/notes`, {
    method: 'POST',
    body: JSON.stringify({ content })
  })
  document.getElementById('noteSaveSpinner').classList.add('d-none')

  if (!res || !res.ok) {
    const err = res ? await res.json().catch(() => ({})) : {}
    document.getElementById('noteAlert').innerHTML =
      `<div class="alert alert-danger py-2 small">${err.message || err.error || 'Failed to save.'}</div>`
    return
  }

  bootstrap.Modal.getInstance(document.getElementById('noteModal')).hide()
  showToast('Note added!', 'success')
  loadNotes()
}

async function deleteNote(noteId) {
  if (!confirm('Delete this note?')) return
  const res = await apiFetch(`/bookmarks/${bmId}/notes/${noteId}`, { method: 'DELETE' })
  if (!res) return
  if (res.status === 204 || res.ok) {
    document.getElementById(`note-${noteId}`)?.remove()
    showToast('Note deleted.', 'success')
    // refresh to update count in list if they go back
    const notesLeft = document.querySelectorAll('[id^="note-"]').length
    if (notesLeft === 0) {
      document.getElementById('notesContainer').innerHTML =
        `<div class="empty-state"><i class="bi bi-chat-left-dots"></i><p>No notes yet.</p></div>`
    }
  } else {
    const err = await res.json().catch(() => ({}))
    showToast(err.message || 'Delete failed.', 'error')
  }
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
