<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Categories — LinkVault</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container py-3" style="max-width:900px">
  <div class="page-header">
    <h1 class="page-title"><i class="bi bi-folder2-open me-2" style="color:var(--accent)"></i>Categories</h1>
    <div class="d-flex gap-2">
      <button class="btn btn-sm btn-outline-secondary" onclick="exportCategories()">
        <i class="bi bi-download me-1"></i>Export
      </button>
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#catModal" onclick="openCreate()">
        <i class="bi bi-plus-lg me-1"></i>New Category
      </button>
    </div>
  </div>

  <div id="mainAlert"></div>

  <div class="card">
    <div class="table-responsive">
      <table class="table mb-0">
        <thead>
          <tr>
            <th>Name</th>
            <th>Description</th>
            <th class="text-center">Bookmarks</th>
            <th class="text-center">Notes</th>
            <th>Created</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="catTable">
          <tr class="loading-row"><td colspan="6"><div class="spinner-border spinner-border-sm text-secondary me-2"></div>Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- create/edit modal -->
<div class="modal fade" id="catModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="catModalTitle">New Category</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="modalAlert"></div>
        <div class="mb-3">
          <label class="form-label">Name <span class="text-danger">*</span></label>
          <input type="text" id="catName" class="form-control" placeholder="e.g. Development" maxlength="100">
        </div>
        <div class="mb-3">
          <label class="form-label">Description <span class="text-muted small">(optional)</span></label>
          <textarea id="catDesc" class="form-control" rows="3" placeholder="What's this category about?"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" id="saveBtn" onclick="saveCategory()">
          <span id="saveSpinner" class="spinner-border spinner-border-sm me-2 d-none"></span>
          Save
        </button>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
buildNav('categories')

let allCats = []
let editingId = null

// load on page open
loadCategories()

async function loadCategories() {
  const res = await apiFetch('/categories')
  if (!res) return
  allCats = await res.json()
  renderTable(allCats)
}

function renderTable(cats) {
  const tbody = document.getElementById('catTable')
  if (cats.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6">
      <div class="empty-state">
        <i class="bi bi-folder-x"></i>
        <p>No categories yet. Create your first one!</p>
      </div></td></tr>`
    return
  }
  tbody.innerHTML = cats.map(c => `
    <tr>
      <td><span class="fw-600">${escHtml(c.categoryName)}</span></td>
      <td class="text-muted small">${escHtml(c.description || '—')}</td>
      <td class="text-center">
        <span class="badge bg-primary bg-opacity-25 text-primary">${c.bookmarksCount ?? 0}</span>
      </td>
      <td class="text-center">
        <span class="badge bg-success bg-opacity-25 text-success">${c.notesCount ?? 0}</span>
      </td>
      <td class="text-muted small">${fmtDate(c.createdAt)}</td>
      <td class="text-end">
        <button class="btn btn-sm btn-outline-secondary me-1" onclick="openEdit(${c.id})">
          <i class="bi bi-pencil"></i>
        </button>
        <button class="btn btn-sm btn-outline-danger" onclick="deleteCat(${c.id}, '${escHtml(c.categoryName)}')">
          <i class="bi bi-trash3"></i>
        </button>
      </td>
    </tr>`).join('')
}

function openCreate() {
  editingId = null
  document.getElementById('catModalTitle').textContent = 'New Category'
  document.getElementById('catName').value = ''
  document.getElementById('catDesc').value = ''
  document.getElementById('modalAlert').innerHTML = ''
  // dont use textContent on the btn itself since it kills the spinner span inside!
  document.getElementById('saveSpinner').classList.add('d-none')
  document.getElementById('saveBtn').lastChild.textContent = ' Create'
}

function openEdit(id) {
  const cat = allCats.find(c => c.id === id)
  if (!cat) return
  editingId = id
  document.getElementById('catModalTitle').textContent = 'Edit Category'
  document.getElementById('catName').value = cat.categoryName
  document.getElementById('catDesc').value = cat.description || ''
  document.getElementById('modalAlert').innerHTML = ''
  document.getElementById('saveBtn').textContent = 'Save Changes'
  new bootstrap.Modal(document.getElementById('catModal')).show()
}

async function saveCategory() {
  const name = document.getElementById('catName').value.trim()
  const desc = document.getElementById('catDesc').value.trim()
  if (!name) { showModalAlert('Name is required.'); return }

  const spinner = document.getElementById('saveSpinner')
  spinner.classList.remove('d-none')

  const body = { categoryName: name, description: desc || null }
  const path = editingId ? `/categories/${editingId}` : '/categories'
  const method = editingId ? 'PUT' : 'POST'

  const res = await apiFetch(path, { method, body: JSON.stringify(body) })
  spinner.classList.add('d-none')

  if (!res) return
  if (!res.ok) {
    const err = await res.json().catch(() => ({}))
    showModalAlert(err.message || err.error || 'Something went wrong.')
    return
  }

  bootstrap.Modal.getInstance(document.getElementById('catModal')).hide()
  showToast(editingId ? 'Category updated!' : 'Category created!', 'success')
  loadCategories()
}

async function deleteCat(id, name) {
  if (!confirm(`Delete category "${name}"?\nThis will fail if it has bookmarks or notes.`)) return

  const res = await apiFetch(`/categories/${id}`, { method: 'DELETE' })
  if (!res) return
  if (res.status === 204 || res.ok) {
    showToast('Category deleted.', 'success')
    loadCategories()
  } else {
    const err = await res.json().catch(() => ({}))
    showToast(err.message || err.error || 'Cannot delete this category.', 'error')
  }
}

function showModalAlert(msg) {
  document.getElementById('modalAlert').innerHTML =
    `<div class="alert alert-danger py-2 small">${msg}</div>`
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

function exportCategories() {
  exportJson(allCats, 'categories.json')
  showToast('Exported!', 'info')
}

// keyboard shortcut: N = open new modal
document.addEventListener('keydown', e => {
  if (e.key === 'n' && !e.target.matches('input,textarea')) {
    openCreate()
    new bootstrap.Modal(document.getElementById('catModal')).show()
  }
})
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
